<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SRT Monitor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0a0a0b; color: #fff;
         font: 17px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 64px 24px 80px; }
  .icon { width: 84px; height: 84px; border-radius: 20px; background: #0A84FF;
          display: grid; place-items: center; }
  h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; margin: 24px 0 4px; }
  .tag { color: rgba(235,235,245,0.6); margin: 0 0 36px; }
  a.btn { display: flex; align-items: center; justify-content: space-between;
          text-decoration: none; color: #fff; background: #1c1c1e;
          border: 1px solid rgba(255,255,255,0.10); border-radius: 14px;
          padding: 16px 18px; margin-bottom: 12px; }
  a.btn:hover { background: #232325; }
  a.btn .chev { color: rgba(235,235,245,0.3); }
  footer { color: rgba(235,235,245,0.3); font-size: 13px; margin-top: 40px; }
  a { color: #0A84FF; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg width="48" height="48" viewBox="0 0 100 100" fill="none" stroke="#fff" stroke-width="6"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 50 H30 L37 42 L43 50 H46 L52 28 L58 72 L63 50 H92"/>
      </svg>
    </div>
    <h1>SRT Monitor</h1>
    <p class="tag">Diagnostic monitor and player for SRT and HLS streams.</p>
    <a class="btn" href="privacy.html"><span>Privacy Policy</span><span class="chev">›</span></a>
    <a class="btn" href="support.html"><span>Support</span><span class="chev">›</span></a>
    <footer>© 2026 SRT Monitor.</footer>
  </div>
</body>
</html>
